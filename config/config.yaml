# Configuration for Fed Minutes Analysis

paths:
  pdf_dir: "data/raw/PDFs"
  txt_dir: "data/raw/TXTs"
  processed_dir: "data/processed"
  vector_db: "data/vector_db/chromadb"

parsing:
  min_attendees_threshold: 3
  min_decisions_threshold: 1
  
embedding:
  model: "all-MiniLM-L6-v2"
  chunk_size: 1000
  chunk_overlap: 200
  
llm:
  provider: "openai"  # or "anthropic", "local"
  model: "gpt-4"
  temperature: 0.1
  max_tokens: 1000

analysis:
  start_date: "1968-01-01"
  end_date: "1973-12-31"
  focal_events:
    - date: "1971-08-15"
      name: "Nixon Shock"
    - date: "1973-03-01"
      name: "Bretton Woods Collapse"


